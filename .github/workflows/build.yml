name: Build debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Ensure Xposed init asset and apply MainHook patch
        run: |
          mkdir -p app/src/main/assets
          printf '%s\n' 'com.squeeare.hidelockwidgets.MainHook' > app/src/main/assets/xposed_init
          python3 scripts/patch_mainhook_depth.py
          echo '--- xposed_init ---'
          cat app/src/main/assets/xposed_init
          echo '--- Iconify-style own depth markers ---'
          grep -nE 'own depth background added to window root|own depth foreground added to keyguard parent|using own widget/foreground parent|DEPTH_BACKGROUND_FILE' app/src/main/java/com/squeeare/hidelockwidgets/MainHook.java || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HideLockWidgets-debug-apk
          path: app/build/outputs/apk/debug/*.apk
